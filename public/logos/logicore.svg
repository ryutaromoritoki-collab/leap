<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">LogiCore icon mark</title>
  <desc id="desc">A creative logistics icon combining a dimensional core, route lines, and forward motion.</desc>
  <defs>
